document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

;border-radius:3px;border:1px solid var(--line,#2a302c);background:transparent;color:var(--dim,#7d8579);transition:color .15s,border-color .15s;\">{{ r.copyLabel }}<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ verify.show }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"{{ verify.style }} margin-top:24px;border:1px solid var(--line,#2a302c);border-radius:4px;padding:16px 18px;font-size:12.5px;letter-spacing:.02em;line-height:1.65;color:var(--dim,#7d8579);animation:rpRise .35s ease both;\">\n        <div style=\"{{ verify.hStyle }} text-transform:uppercase;letter-spacing:.18em;font-size:10px;margin-bottom:9px;font-weight:400;\">{{ verify.title }}<\u002Fdiv>\n        <span>{{ verify.body }}<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <div style=\"margin-top:42px;border-top:1px solid var(--line,#2a302c);padding-top:22px;font-size:11.5px;color:var(--dim,#7d8579);letter-spacing:.02em;line-height:1.8;display:flex;flex-direction:column;gap:11px;\">\n      <p style=\"margin:0;\"><b style=\"color:var(--ink,#e8e4d8);font-weight:400;\">{{ t.noteReadT }}<\u002Fb> {{ t.noteReadB }}<\u002Fp>\n      <p style=\"margin:0;\"><b style=\"color:var(--ink,#e8e4d8);font-weight:400;\">{{ t.noteWhyT }}<\u002Fb> {{ t.noteWhyB }}<\u002Fp>\n      <p style=\"margin:0;\"><b style=\"color:var(--ink,#e8e4d8);font-weight:400;\">{{ t.noteCrossT }}<\u002Fb> {{ t.noteCrossB }}<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:30px;text-align:center;font-size:10.5px;letter-spacing:.1em;color:var(--dim,#7d8579);opacity:.7;text-transform:uppercase;\">{{ t.footer }}<\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:900},\n&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#d8552f&quot;,&quot;option         verifyFailTitle:\"확인 필요\", verifyFailBody:\"파일명 순서와 카운트 증가가 일치하지 않습니다. 파일을 촬영 순서대로 올렸는지 확인하거나, 펌웨어가 다른 개체일 수 있습니다.\",\n        noteReadT:\"읽는 위치.\", noteReadB:\"CR3 → moov → 메타데이터 트랙 → CTMD 청크 → 레코드 8 → TIFF tag 0x000D → blob offset 0x960 (uint32 LE). 직접 리버스 엔지니어링으로 찾았고 캐논 서비스센터 공식값과 일치 검증됨.\",\n        noteWhyT:\"왜 이 방식인가.\", noteWhyB:\"EOS RP는 셔터 카운트를 EXIF에 쓰지 않고 gphoto2 표준 항목으로도 노출하지 않습니다. 값은 CR3의 CTMD 메타데이터 안에만 있어 RAW 파일 한 장이면 읽어낼 수 있습니다.\",\n        noteCrossT:\"교차검증.\", noteCrossB:\"컷수가 다른 CR3를 2장 이상 올리면, 해당 오프셋 값이 촬영 장수 차이만큼 증가하는지 자동 확인합니다 — 다른 RP 개체·펌웨어에서도 신뢰성을 자가 점검할 수 있습니다.\",\n        footer:\"모든 처리는 브라우저 안에서 · 업로드 없음\",\n        certBtn:\"인증서\", copyBtn:\"복사\", copied:\"복사됨\",\n        errNotCr3:\"CR3 아님\", errNoMoov:\"moov 없음 — CR3가 아닐 수 있음\", errNoTrak:\"trak 없음\", errNoLoc:\"CTMD 위치 정보(co64/stsz) 없음\", errNoCtmd:\"CTMD 레코드 8 없음\", errNoTiff:\"TIFF 헤더 없음\", errNoTag:\"tag 0x000D 없음 — RP가 아니거나 포맷이 다름\", errRead:\"읽기 실패\",\n        bodySerial:\"바디 시리얼\", lensModel:\"렌즈\", lensSerial:\"렌즈 시리얼\",\n        cert:{ title:\"셔터 카운트 인증서\", countLabel:\"누적 셔터 작동 수\", fileLabel:\"원본 파일\", sourceLabel:\"읽은 위치\", methodLabel:\"방식 / 시그널 바이트\", verifiedLabel:\"교차검증\", dateLabel:\"발급일\", tagline:\"RAW 파일에서 로컬로 읽음 · 업로드 없음\", unverified:\"단일 파일 (교차검증 없음)\", serialLabel:\"바디 시리얼\", lensLabel:\"렌즈 정보\" } },\n\n      en:{ subtitle:\"Canon EOS RP · Shutter Count Reader\", theme:\"light / dark\",\n        dropLead:\"Drag a CR3 file here, or click to choose\", dropHint:\".CR3 only · files never leave your device · drop 2+ for auto cross-check\",\n        unit:\"shots\", hexLabel:\"offset 0x960\", uint:\"uint32 LE\",\n        verifyPassTitle:\"Cross-check passed\", verifyPassBody:\"Counts increase monotonically in shooting order ({lo} → {hi}, range {span}). Confirms offset 0x960 reads the RP shutter count correctly.\",\n        verifyFailTitle:\"Needs a look\", verifyFailBody:\"Filename order and count order don't match. Check that files are in shooting order, or this den und mit dem offiziellen Wert des Canon-Service abgeglichen.\",\n        noteWhyT:\"Warum so.\", noteWhyB:\"Die EOS RP schreibt den Auslösezähler nicht in die EXIF-Daten und gibt ihn nicht über die Standard-gphoto2-Einträge aus. Der Wert liegt nur in den CTMD-Metadaten der CR3, daher genügt eine einzige RAW-Datei.\",\n        noteCrossT:\"Abgleich.\", noteCrossB:\"Lädst du zwei oder mehr CR3s mit verschiedenen Zählwerten, prüft die App automatisch, ob der Wert an Offset 0x960 genau um die Aufnahmedifferenz steigt — ein Selbsttest, der auch bei anderen RP-Gehäusen und Firmwares hält.\",\n        footer:\"alles im Browser verarbeitet · kein Upload\",\n        certBtn:\"Zertifikat\", copyBtn:\"Kopieren\", copied:\"Kopiert\",\n        errNotCr3:\"keine CR3\", errNoMoov:\"kein moov — evtl. keine CR3\", errNoTrak:\"kein trak\", errNoLoc:\"keine CTMD-Position (co64/stsz)\", errNoCtmd:\"kein CTMD-Record 8\", errNoTiff:\"kein TIFF-Header\", errNoTag:\"Tag 0x000D nicht gefunden — keine RP oder anderes Format\", errRead:\"Lesen fehlgeschlagen\",\n        bodySerial:\"Gehäusenummer\", lensModel:\"Objektiv\", lensSerial:\"Objektivnummer\",\n        cert:{ title:\"AUSLÖSEZÄHLER-ZERTIFIKAT\", countLabel:\"GESAMTE AUSLÖSUNGEN\", fileLabel:\"Quelldatei\", sourceLabel:\"Leseposition\", methodLabel:\"Methode / Signal-Bytes\", verifiedLabel:\"Abgeglichen\", dateLabel:\"Ausgestellt\", tagline:\"Lokal aus der RAW-Datei gelesen · kein Upload\", unverified:\"Einzeldatei (kein Abgleich)\", serialLabel:\"Gehäusenummer\", lensLabel:\"Objektiv\" } },\n\n      fr:{ subtitle:\"Canon EOS RP · Lecteur de déclenchements\", theme:\"clair / sombre\",\n        dropLead:\"Glissez un fichier CR3 ici, ou cliquez pour choisir\", dropHint:\".CR3 uniquement · les fichiers ne quittent jamais votre appareil · 2 fichiers ou plus = vérification croisée automatique\",\n        unit:\"déclenchements\", hexLabel:\"offset 0x960\", uint:\"uint32 LE\",\n        verifyPassTitle:\"Vérification croisée réussie\", verifyPassBody:\"Les compteurs augmentent de façon monotone dans l'ordre de prise de vue ({lo} → {hi}, plage {span}). Confirme que l'offset 0x960 lit correctement le compteur de la RP.\",\n        verifyFailTitle:\"À vérifier\", verifyFailBody:\"L'ordre des noms de fichiers et celui des compteurs ne correspondent pas. Vérifiez que les fichiers sont dans l'ordre de prise de vue, ou il peut s'agir d'un boîtier au firmware différent.\",\n        noteReadT:\"Où la lecture se fait.\", noteReadB:\"CR3 → moov → piste de métadonnées → bloc CTMD → enregistrement 8 → tag TIFF 0x000D → offset blob 0x960 (uint32 LE). Trouvé par rétro-ingénierie directe et vérifié face à la valeur officielle du SAV Canon.\",\n        noteWhyT:\"Pourquoi ainsi.\", noteWhyB:\"L'EOS RP n'écrit pas son compteur de déclenchements dans l'EXIF et ne l'expose pas via les entrées gphoto2 standard. La valeur ne se trouve que dans les métadonnées CTMD du CR3, donc un seul fichier RAW suffit.\",\n        noteCrossT:\"Vérification croisée.\", noteCrossB:\"Déposez deux CR3 ou plus avec des compteurs différents et l'application confirme que la valeur à l'offset 0x960 augmente exactement de l'écart de prises — un autotest valable sur d'autres boîtiers RP et firmwares.\",\n        footer:\"tout traité dans le navigateur · aucun envoi\",\n        certBtn:\"Certificat\", copyBtn:\"Copier\", copied:\"Copié\",\n        errNotCr3:\"pas un CR3\", errNoMoov:\"pas de moov — peut-être pas un CR3\", errNoTrak:\"pas de trak\", errNoLoc:\"pas de position CTMD (co64/stsz)\", errNoCtmd:\"pas d'enregistrement CTMD 8\", errNoTiff:\"pas d'en-tête TIFF\", errNoTag:\"tag 0x000D introuvable — pas une RP ou format différent\", errRead:\"échec de lecture\",\n        bodySerial:\"N° de série boîtier\", lensModel:\"Objectif\", lensSerial:\"N° de série objectif\",\n        cert:{ title:\"CERTIFICAT DE DÉCLENCHEMENTS\", countLabel:\"TOTAL DES DÉCLENCHEMENTS\", fileLabel:\"Fichier source\", sourceLabel:\"Position de lecture\", methodLabel:\"Méthode / octets signal\", verifiedLabel:\"Vérification croisée\", dateLabel:\"Émis le\", tagline:\"Lu en local depuis le fichier RAW · aucun envoi\", unverified:\"fichier unique (pas de vérification croisée)\", serialLabel:\"N° de série\", lensLabel:\"Objectif\" } },\n\n      ru:{ subtitle:\"Canon EOS RP · Счётчик срабатываний затвора\", theme:\"светлая / тёмная\",\n        dropLead:\"Перетащите файл CR3 сюда или нажмите для выбора\", dropHint:\"только .CR3 · файлы никуда не отправляются · 2+ файла — автоматическая перекрёстная проверка\",\n        unit:\"кадров\", hexLabel:\"offset 0x960\", uint:\"uint32 LE\",\n        verifyPassTitle:\"Перекрёстная проверка пройдена\", verifyPassBody:\"Счётчики монотонно возрастают в порядке съёмки ({lo} → {hi}, диапазон {span}). Подтверждено, что смещение 0x960 корректно читает счётчик затвора RP.\",\n        verifyFailTitle:\"Требует проверки\", verifyFailBody:\"Порядок имён файлов и порядок счётчиков не совпадают. Проверьте, загружены ли файлы в порядке съёмки, либо это аппарат с другой прошивкой.\",\n        noteReadT:\"Где читается.\", noteReadB:\"CR3 → moov → трек метаданных → блок CTMD → запись 8 → TIFF-тег 0x000D → смещение blob 0x960 (uint32 LE). Найдено прямым реверс-инжинирингом и сверено с официальным значением сервис-центра Canon.\",\n        noteWhyT:\"Почему так.\", noteWhyB:\"EOS RP не записывает счётчик затвора в EXIF и не выдаёт его через стандартные записи gphoto2. Значение хранится только в метаданных CTMD внутри CR3, поэтому достаточно одного RAW-файла.\",\n        noteCrossT:\"Перекрёстная проверка.\", noteCrossB:\"Загрузите два или более CR3 с разными значениями, и приложение автоматически проверит, что значение по смещению 0x960 возрастает ровно на разницу в числе кадров — самопроверка, работающая и на других аппаратах RP и прошивках.\",\n        footer:\"всё обрабатывается в браузере · без загрузки\",\n        certBtn:\"Сертификат\", copyBtn:\"Копировать\", copied:\"Скопировано\",\n        errNotCr3:\"не CR3\", errNoMoov:\"нет moov — возможно, не CR3\", errNoTrak:\"нет trak\", errNoLoc:\"нет позиции CTMD (co64/stsz)\", errNoCtmd:\"нет записи CTMD 8\", errNoTiff:\"нет заголовка TIFF\", errNoTag:\"тег 0x000D не найден — не RP или другой формат\", errRead:\"ошибка чтения\",\n        bodySerial:\"Серийный номер\", lensModel:\"Объектив\", lensSerial:\"Серийный № объектива\",\n        cert:{ title:\"СЕРТИФИКАТ СЧЁТЧИКА ЗАТВОРА\", countLabel:\"ВСЕГО СРАБАТЫВАНИЙ ЗАТВОРА\", fileLabel:\"Исходный файл\", sourceLabel:\"Позиция чтения\", methodLabel:\"Метод / сигнальные байты\", verifiedLabel:\"Перекрёстная проверка\", dateLabel:\"Выдан\", tagline:\"Прочитано локально из RAW-файла · без загрузки\", unverified:\"один файл (без перекрёстной проверки)\", serialLabel:\"Серийный номер\", lensLabel:\"Объектив\" } }\n    };\n  }\n  t(){ return this.dict()[this.state.lang] || this.dict().ko; }\n  locale(){ return ({ko:'ko-KR',en:'en-US',ja:'ja-JP',zh:'zh-CN',de:'de-DE',fr:'fr-FR',ru:'ru-RU'})[this.state.lang] || 'en-US'; }\n\n  /* ── theme palette ──────────────────────────────── */\n  palette(){\n    const accent = this.props.accent || null;\n    const base = this.state.theme === 'light'\n      ? { bg:'#efece2', panel:'#f8f6ef', ink:'#20231f', dim:'#6e756a', line:'#dad4c6', signal:'#bf4a26', signalGlow:'#bf4a26', ok:'#5f8235', hexbg:'rgba(0,0,0,.045)', scan:'rgba(0,0,0,.012)', dropglow:'rgba(191,74,38,.06)', glowShadow:'rgba(191,74,38,.25)', btnInk:'#f8f6ef' }\n      : { bg:'#0d0f0e', panel:'#151917', ink:'#e8e4d8', dim:'#7d8579', line:'#2a302c', signal:'#d8552f', signalGlow:'#ff7a4d', ok:'#9bbf6a', hexbg:'rgba(0,0,0,.22)', scan:'rgba(255,255,255,.012)', dropglow:'rgba(216,85,47,.06)', glowShadow:'rgba(255,122,77,.4)', btnInk:'#0d0f0e' };\n    if (accent){ base.signal = accent; base.signalGlow = accent; base.dropglow = accent + '14'; }\n    if (this.props.scanlines === false) base.scan = 'transparent';\n    return base;\n  }\n  rootStyle(){\n    const p = this.palette();\n    return `--bg:${p.bg};--panel:${p.panel};--ink:${p.ink};--dim:${p.dim};--line:${p.line};--signal:${p.signal};--signal-glow:${p.signalGlow};--ok:${p.ok};--hexbg:${p.hexbg};--scan:${p.scan};--dropglow:${p.dropglow};--glowShadow:${p.glowShadow};--btnInk:${p.btnInk};`;\n  }\n\n  /* ── CR3 parser (1:1 port, errors as codes) ─────── */\n  parseCount(buf){\n    const dv = new DataView(buf), u8 = new Uint8Array(buf);\n    const TYPE_SIZE = {1:1,2:1,3:2,4:4,5:8,7:1,8:2,9:4,10:8};\n    const fourcc = (o)=>String.fromCharCode(dv.getUint8(o),dv.getUint8(o+1),dv.getUint8(o+2),dv.getUint8(o+3));\n    const boxes = (start,end)=>{ let o=start; const out=[]; while(o<end-8){ let size=dv.getUint32(o,false); const type=fourcc(o+4); let hdr=8; if(size===1){ const hi=dv.getUint32(o+8,false),lo=dv.getUint32(o+12,false); size=hi*2**32+lo; hdr=16; } else if(size===0){ size=end-o; } out.push({type,off:o,size,hdr}); if(size<=0) break; o+=size; } return out; };\n    const find = (parent,name)=>boxes(parent.off+parent.hdr,parent.off+parent.size).filter(b=>b.type===name);\n\n    const top = boxes(0,dv.byteLength);\n    const moov = top.find(b=>b.type==='moov'); if(!moov) throw new Error('errNoMoov');\n    const traks = boxes(moov.off+moov.hdr,moov.off+moov.size).filter(b=>b.type==='trak'); if(!traks.length) throw new Error('errNoTrak');\n    const mt = traks[traks.length-1];\n    const mdia = find(mt,'mdia')[0]; if(!mdia) throw new Error('errNoLoc');\n    const minf = find(mdia,'minf')[0]; if(!minf) throw new Error('errNoLoc');\n    const stbl = find(minf,'stbl')[0]; if(!stbl) throw new Error('errNoLoc');\n    const co64 = find(stbl,'co64')[0]; const stsz = find(stbl,'stsz')[0];\n    if(!co64 || !stsz) throw new Error('errNoLoc');\n\n    const hi = dv.getUint32(co64.off+16,false), lo = dv.getUint32(co64.off+20,false);\n    const chunkOff = hi*2**32+lo;\n    const ss = dv.getUint32(stsz.off+12,false);\n    const chunkSize = ss ? ss : dv.getUint32(stsz.off+20,false);\n\n    const records = {}; let off = chunkOff; const chunkEnd = chunkOff+chunkSize;\n    while(off < chunkEnd-6){ const rs=dv.getUint32(off,true); const rt=dv.getUint16(off+4,true); if(rs<6 || off+rs>chunkEnd) break; records[rt]={off,size:rs}; off+=rs; }\n    const rec = records[8]; if(!rec) throw new Error('errNoCtmd');\n\n    let p = -1;\n    for(let i=rec.off; i<rec.off+rec.size-4; i++){ if(u8[i]===0x49&&u8[i+1]===0x49&&u8[i+2]===0x2a&&u8[i+3]===0x00){ p=i; break; } }\n    if(p<0) throw new Error('errNoTiff');\n\n    const ifd = dv.getUint32(p+4,true); let q = p+ifd;\n    const n = dv.getUint16(q,true); q += 2;\n    for(let k=0;k<n;k++){ const eoff=q+k*12; const tag=dv.getUint16(eoff,true); const typ=dv.getUint16(eoff+2,true); const cnt=dv.getUint32(eoff+4,true); const blen=(TYPE_SIZE[typ]||1)*cnt; let dataOff; if(blen<=4){ dataOff=eoff+8; } else { dataOff=p+dv.getUint32(eoff+8,true); } if(tag===0x000D){ const valOff=dataOff+0x960; const count=dv.getUint32(valOff,true); const bytes=[u8[valOff],u8[valOff+1],u8[valOff+2],u8[valOff+3]]; return {count,bytes}; } }\n    throw new Error('errNoTag');\n  }\n\n  readExif(buf){\n    const dv = new DataView(buf), u8 = new Uint8Array(buf);\n    const fourcc = (o)=>String.fromCharCode(dv.getUint8(o),dv.getUint8(o+1),dv.getUint8(o+2),dv.getUint8(o+3));\n    const bxs = (start,end)=>{ let o=start; const out=[]; while(o<end-8){ let size=dv.getUint32(o,false); const type=fourcc(o+4); let hdr=8; if(size===1){ const hi=dv.getUint32(o+8,false),lo=dv.getUint32(o+12,false); size=hi*2**32+lo; hdr=16; } else if(size===0){ size=end-o; } out.push({type,off:o,size,hdr}); if(size<=0) break; o+=size; } return out; };\n    const TS={1:1,2:1,3:2,4:4,5:8,6:1,7:1,8:2,9:4,10:8,11:4,12:8};\n    const readAscii=(off,len)=>{let s='';for(let i=0;i<len;i++){const c=u8[off+i];if(c===0)break;s+=String.fromCharCode(c);}return s;};\n    const ifdTags=(base)=>{\n      const le=fourcc(base).startsWith('II');\n      const ifdOff=dv.getUint32(base+4,le);\n      let p=base+ifdOff; const n=dv.getUint16(p,le); p+=2;\n      const tags={};\n      for(let i=0;i<n;i++){ const e=p+i*12; const tag=dv.getUint16(e,le),typ=dv.getUint16(e+2,le),cnt=dv.getUint32(e+4,le); const blen=(TS[typ]||1)*cnt; const dataOff=blen<=4?e+8:base+dv.getUint32(e+8,le); tags[tag]={typ,cnt,dataOff}; }\n      return tags;\n    };\n    const out={};\n    try{\n      const top=bxs(0,dv.byteLength);\n      const moov=top.find(b=>b.type==='moov'); if(!moov) return out;\n      const inner=bxs(moov.off+moov.hdr,moov.off+moov.size);\n      const uuid=inner.find(b=>b.type==='uuid'); if(!uuid) return out;\n      const cmts=bxs(uuid.off+uuid.hdr+16,uuid.off+uuid.size);\n      const cmt1=cmts.find(b=>b.type==='CMT1');\n      const cmt2=cmts.find(b=>b.type==='CMT2');\n      if(cmt1){ const tags=ifdTags(cmt1.off+cmt1.hdr); if(tags[0x0110]) out.model=readAscii(tags[0x0110].dataOff,tags[0x0110].cnt); }\n      if(cmt2){ const tags=ifdTags(cmt2.off+cmt2.hdr); if(tags[0xa431]) out.serial=readAscii(tags[0xa431].dataOff,tags[0xa431].cnt); if(tags[0xa434]) out.lens=readAscii(tags[0xa434].dataOff,tags[0xa434].cnt); if(tags[0xa435]) out.lensSerial=readAscii(tags[0xa435].dataOff,tags[0xa435].cnt); }\n    }catch(e){}\n    return out;\n  }\n\n  async handleFiles(list){\n    const files = Array.from(list || []);\n    let parsed = this.state.parsed.slice();\n    for(const file of files){\n      parsed = parsed.filter(r=>r.name!==file.name);\n      if(!/\\.cr3$/i.test(file.name)){ parsed.push({name:file.name, errorCode:'errNotCr3'}); continue; }\n      try{ const buf = await file.arrayBuffer(); const {count,bytes} = this.parseCount(buf); const exif = this.readExif(buf); parsed.push({name:file.name, count, bytes, ...exif}); }\n      catch(err){ parsed.push({name:file.name, errorCode: (err && /^err/.test(err.message)) ? err.message : 'errRead'}); }\n    }\n    parsed.sort((a,b)=>a.name.localeCompare(b.name, undefined, {numeric:true}));\n    this.setState({parsed});\n  }\n\n  verifyInfo(){\n    const good = this.state.parsed.filter(r=>!r.errorCode);\n    if(good.length < 2) return {state:'none'};\n    const sorted = [...good].sort((a,b)=>a.name.localeCompare(b.name, undefined, {numeric:true}));\n    let monotonic = true;\n    for(let i=1;i<sorted.length;i++){ if(sorted[i].count < sorted[i-1].count){ monotonic=false; break; } }\n    const lo = Math.min(...good.map(r=>r.count));\n    const hi = Math.max(...good.map(r=>r.count));\n    return {state: monotonic?'pass':'fail', lo, hi, span: hi-lo};\n  }\n\n  copyResult(p){\n    const t = this.t(), loc = this.locale();\n    const lines = [(p.model||'Canon EOS RP')+' — '+p.count.toLocaleString(loc)+' '+t.unit]; if(p.serial) lines.push(t.bodySerial+': '+p.serial); lines.push(t.cert.fileLabel+': '+p.name); if(p.lens) lines.push(t.lensModel+': '+p.lens+(p.lensSerial?' ('+p.lensSerial+')':'')); lines.push(t.noteReadT+' CTMD record 8 \\u2192 TIFF 0x000D \\u2192 offset 0x960 (uint32 LE)'); lines.push(t.cert.tagline); const txt = lines.join('\\n');\n    const done = ()=>{ this.setState({copied:p.name}); setTimeout(()=>{ if(this.state.copied===p.name) this.setState({copied:null}); }, 1800); };\n    if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(txt).then(done).catch(done); }\n    else { try{ const ta=document.createElement('textarea'); ta.value=txt; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); }catch(e){} done(); }\n  }\n\n  /* ── certificate canvas ─────────────────────────── */\n  async makeCertificate(p){\n    try{ if(document.fonts && document.fonts.ready) await document.fonts.ready; }catch(e){}\n    const t = this.t(), loc = this.locale(), pal = this.palette();\n    const cjk = `'DM Mono','Hiragino Sans','Yu Gothic','Microsoft YaHei','Noto Sans CJK SC','Noto Sans CJK JP',sans-serif`;\n    const S = 2, W = 1080, H = 1460;\n    const cv = document.createElement('canvas'); cv.width = W*S; cv.height = H*S;\n    const x = cv.getContext('2d'); x.scale(S,S);\n    const cx = W/2;\n    x.fillStyle = pal.bg; x.fillRect(0,0,W,H);\n    if(this.props.scanlines !== false){ x.fillStyle = pal.scan === 'transparent' ? 'rgba(0,0,0,0)' : pal.scan; for(let i=0;i<W;i+=4){ x.fillRect(i,0,1,H); } }\n    x.strokeStyle = pal.line; x.lineWidth = 1; x.strokeRect(28.5,28.5,W-57,H-57);\n    x.strokeStyle = pal.signal; x.lineWidth = 2; x.strokeRect(42,42,W-84,H-84);\n\n    // aperture\n    x.lineWidth = 2; x.strokeStyle = pal.dim; x.beginPath(); x.arc(cx,150,28,0,Math.PI*2); x.stroke();\n    x.strokeStyle = pal.signal; x.beginPath(); x.arc(cx,150,11,0,Math.PI*2); x.stroke();\n\n    x.textAlign = 'center';\n    x.fillStyle = pal.dim; x.letterSpacing = '5px'; x.font = `400 16px 'DM Mono',monospace`;\n    x.fillText(t.cert.title.toUpperCase(), cx+2.5, 234);\n    x.letterSpacing = '0px';\n    x.fillStyle = pal.ink; x.font = `500 28px ${cjk}`; x.fillText(p.model||'Canon EOS RP', cx, 280);\n    if(p.serial){ x.fillStyle = pal.signal; x.letterSpacing = '2px'; x.font = `500 22px 'DM Mono',monospace`; x.fillText(p.serial, cx, 318); x.letterSpacing = '0px'; }\n\n    x.fillStyle = pal.signalGlow; x.font = `500 110px 'DM Mono',monospace`; x.textBaseline='alphabetic';\n    x.fillText(p.count.toLocaleString(loc), cx, 470);\n    x.fillStyle = pal.dim; x.letterSpacing = '3px'; x.font = `400 14px ${cjk}`;\n    x.fillText(t.cert.countLabel.toUpperCase(), cx+1.5, 520); x.letterSpacing = '0px';\n\n    x.strokeStyle = pal.line; x.lineWidth = 1; x.beginPath(); x.moveTo(90,565); x.lineTo(W-90,565); x.stroke();\n\n    const hexStr = p.bytes.map(b=>b.toString(16).padStart(2,'0')).join(' ');\n    const vi = this.verifyInfo();\n    const verVal = vi.state==='pass' ? `${vi.lo.toLocaleString(loc)} → ${vi.hi.toLocaleString(loc)}` : t.cert.unverified;\n    const rows = [\n      [t.cert.fileLabel, p.name, pal.ink],\n      [t.cert.serialLabel, p.serial||'—', pal.ink],\n      [t.cert.lensLabel, (p.lens||'—')+(p.lensSerial?' · '+p.lensSerial:''), pal.ink],\n      [t.cert.sourceLabel, 'CTMD rec 8 → TIFF 0x000D → offset 0x960', pal.ink],\n      [t.cert.methodLabel, `uint32 LE · ${hexStr}`, pal.signal],\n      [t.cert.verifiedLabel, verVal, vi.state==='pass'?pal.ok:pal.dim]\n    ];\n    x.textAlign = 'left';\n    let ry = 630; const maxW = W-180;\n    for(const [label,value,vcolor] of rows){\n      x.fillStyle = pal.dim; x.letterSpacing = '2px'; x.font = `400 12px ${cjk}`;\n      x.fillText(label.toUpperCase(), 92, ry); x.letterSpacing = '0px';\n      let fs = 21; x.fillStyle = vcolor; x.font = `400 ${fs}px ${cjk}`;\n      while(x.measureText(value).width > maxW && fs > 12){ fs -= 1; x.font = `400 ${fs}px ${cjk}`; }\n      x.fillText(value, 92, ry+34);\n      ry += 88;\n    }\n\n    x.strokeStyle = pal.line; x.lineWidth = 1; x.beginPath(); x.moveTo(90,1170); x.lineTo(W-90,1170); x.stroke();\n    const dateStr = new Intl.DateTimeFormat(loc, {year:'numeric',month:'long',day:'numeric'}).format(new Date());\n    x.textAlign = 'center';\n    x.fillStyle = pal.dim; x.letterSpacing = '1px'; x.font = `400 14px ${cjk}`;\n    x.fillText(`${t.cert.dateLabel} · ${dateStr}`, cx, 1220); x.letterSpacing = '0px';\n    x.font = `400 13px ${cjk}`; x.fillText(t.cert.tagline, cx, 1255);\n    x.fillStyle = pal.signal; x.font = `400 22px 'Major Mono Display','DM Mono',monospace`;\n    x.fillText('rp·shutter', cx, 1325);\n\n    const fn = `EOS_RP_${p.serial?p.serial+'_':''}shutter_${p.count}.png`;\n    cv.toBlob((blob)=>{ if(!blob) return; const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = fn; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url), 1000); }, 'image/png');\n  }\n\n  /* ── language / theme / dnd ─────────────────────── */\n  setLang(code){ try{ localStorage.setItem('rp_lang', code); }catch(e){} this.setState({lang:code}); }\n  toggleTheme(){ const next = this.state.theme==='dark'?'light':'dark'; try{ localStorage.setItem('rp_theme', next); }catch(e){} this.setState({theme:next}); }\n\n  renderVals(){\n    const t = this.t(), loc = this.locale();\n    const fmt = (s,o)=>s.replace(/\\{(\\w+)\\}/g, (m,k)=> (o[k]!==undefined ? o[k] : m));\n\n    const results = this.state.parsed.map(p=>{\n      if(p.errorCode) return {name:p.name, isError:true, ok:false, errorText: t[p.errorCode] || p.errorCode};\n      const hexStr = p.bytes.map(b=>b.toString(16).padStart(2,'0')).join(' ');\n      const lensInfo = (p.lens||'')+(p.lensSerial?' · '+p.lensSerial:'');\n      return { name:p.name, isError:false, ok:true, countStr:p.count.toLocaleString(loc), hexStr, serial:p.serial||'', model:p.model||'', lens:p.lens||'', lensSerial:p.lensSerial||'', lensInfo,\n        onCert: ()=>this.makeCertificate(p), onCopy: ()=>this.copyResult(p),\n        copyLabel: this.state.copied===p.name ? t.copied : t.copyBtn };\n    });\n\n    const vi = this.verifyInfo();\n    let verify = {show:false};\n    if(vi.state==='pass'){ verify = {show:true, style:'border-color:rgba(155,191,106,.4);background:rgba(155,191,106,.07);', hStyle:'color:var(--ok,#9bbf6a);', title:t.verifyPassTitle, body:fmt(t.verifyPassBody,{lo:vi.lo.toLocaleString(loc),hi:vi.hi.toLocaleString(loc),span:vi.span})}; }\n    else if(vi.state==='fail'){ verify = {show:true, style:'border-color:rgba(216,85,47,.4);background:rgba(216,85,47,.07);', hStyle:'color:var(--signal,#d8552f);', title:t.verifyFailTitle, body:t.verifyFailBody}; }\n\n    const codes = [['ko','한국어'],['en','English'],['ja','日本語'],['zh','中文'],['de','Deutsch'],['fr','Français'],['ru','Русский']];\n    const langs = codes.map(([code,name])=>({ code:code.toUpperCase(), name,\n      onClick: ()=>this.setLang(code),\n      style: this.state.lang===code ? 'background:var(--signal,#d8552f);color:var(--btnInk,#0d0f0e);border-color:var(--signal,#d8552f);' : 'background:transparent;color:var(--dim,#7d8579);border-color:var(--line,#2a302c);' }));\n\n    const onDragOver = (e)=>{ e.preventDefault(); if(!this.state.hot) this.setState({hot:true}); };\n    const onDragLeave = (e)=>{ e.preventDefault(); if(e.currentTarget.contains(e.relatedTarget)) return; this.setState({hot:false}); };\n    const onDrop = (e)=>{ e.preventDefault(); this.setState({hot:false}); this.handleFiles(e.dataTransfer.files); };\n    const onPick = (e)=>{ this.handleFiles(e.target.files); e.target.value=''; };\n\n    return {\n      t, results, verify, langs,\n      rootStyle: this.rootStyle(),\n      dropStyle: this.state.hot ? 'border-color:var(--signal,#d8552f);' : '',\n      apertureStyle: this.state.hot ? 'transform:rotate(45deg);border-color:var(--signal,#d8552f);' : '',\n      knobStyle: `left:${this.state.theme==='dark'?'28px':'4px'};`,\n      onToggleTheme: ()=>this.toggleTheme(),\n      onDragOver, onDragLeave, onDrop, onPick\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
